name: docker-publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:            # Actions 탭에서 수동 실행 버튼 활성화

jobs:
  build-and-push:
    runs-on: ubuntu-latest      # GitHub 제공 Ubuntu 러너에서 빌드
    steps:
      - uses: actions/checkout@v4

      # 러너(amd64)에서 ARM64 크로스 빌드를 위한 준비
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64        # ⭐ OCI ARM(Ubuntu aarch64) 노드용
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sample-inf2:latest
